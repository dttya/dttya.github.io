<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARK LEE ♡ Photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Fredoka+One&family=Nunito:wght@400;700;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ===== THEMES ===== */
:root{
  --bg:#FFE200;
  --bg2:#FFD000;
  --primary:#2B2BA0;
  --primary2:#1E1E8F;
  --accent:#FFE200;
  --accent2:#FFD000;
  --text-on-primary:#fff;
  --text-on-accent:#2B2BA0;
  --frame-bg:#fff;
  --frame-border:#2B2BA0;
  --frame-header:#2B2BA0;
  --frame-footer:#2B2BA0;
  --frame-grid:#ddd8ff;
  --frame-slot:#f0edff;
  --frame-slot-border:#aaa8e0;
  --frame-shadow:#1a1a70;
  --logo-bg:#2B2BA0;
  --logo-text:#fff;
  --logo-shadow:#FFE200;
  --logo-outline:#FFE200;
  --card-bg:#fff;
  --doodle:#2B2BA0;
  --slot-corner:#2B2BA0;
  --slot-num-bg:#FFE200;
  --slot-num-text:#2B2BA0;
  --cam-bg:#2B2BA0;
  --ctrl-bg:#fff;
  --stripe1:#2B2BA0;
  --stripe2:#4444cc;
  --btn-bg:#FFE200;
  --btn-text:#2B2BA0;
  --btn-shadow:#2B2BA0;
  --tab-active-bg:#2B2BA0;
  --tab-active-text:#FFE200;
  --badge-bg:#FFE200;
  --badge-text:#2B2BA0;
  --toast-bg:#2B2BA0;
  --toast-text:#FFE200;
  --illus-border:#2B2BA0;
  --heart:#FF6B9D;
}

body[data-theme="yellow"]{
  --bg:#FFE200;--bg2:#FFD000;--primary:#2B2BA0;--primary2:#1E1E8F;--accent:#FFE200;--accent2:#FFD000;
  --text-on-primary:#fff;--text-on-accent:#2B2BA0;--frame-bg:#fff;--frame-border:#2B2BA0;
  --frame-header:#2B2BA0;--frame-footer:#2B2BA0;--frame-grid:#ddd8ff;--frame-slot:#f0edff;
  --frame-slot-border:#aaa8e0;--frame-shadow:#1a1a70;--logo-bg:#2B2BA0;--logo-text:#fff;
  --logo-shadow:#FFE200;--logo-outline:#FFE200;--card-bg:#fff;--doodle:#2B2BA0;
  --slot-corner:#2B2BA0;--slot-num-bg:#FFE200;--slot-num-text:#2B2BA0;--cam-bg:#2B2BA0;
  --ctrl-bg:#fff;--stripe1:#2B2BA0;--stripe2:#4444cc;--btn-bg:#FFE200;--btn-text:#2B2BA0;
  --btn-shadow:#2B2BA0;--tab-active-bg:#2B2BA0;--tab-active-text:#FFE200;
  --badge-bg:#FFE200;--badge-text:#2B2BA0;--toast-bg:#2B2BA0;--toast-text:#FFE200;
  --illus-border:#2B2BA0;
}
body[data-theme="pink"]{
  --bg:#FFB3CC;--bg2:#FF85A1;--primary:#FF3377;--primary2:#cc1155;--accent:#FFE4EE;--accent2:#FFB3CC;
  --text-on-primary:#fff;--text-on-accent:#FF3377;--frame-bg:#fff;--frame-border:#FF3377;
  --frame-header:#FF3377;--frame-footer:#FF3377;--frame-grid:#FFE4EE;--frame-slot:#FFF0F5;
  --frame-slot-border:#FFB3CC;--frame-shadow:#cc1155;--logo-bg:#FF3377;--logo-text:#fff;
  --logo-shadow:#FFE200;--logo-outline:#FFE200;--card-bg:#fff;--doodle:#FF3377;
  --slot-corner:#FF3377;--slot-num-bg:#FFB3CC;--slot-num-text:#FF3377;--cam-bg:#FF3377;
  --ctrl-bg:#fff;--stripe1:#FF3377;--stripe2:#FF85A1;--btn-bg:#FFB3CC;--btn-text:#FF3377;
  --btn-shadow:#FF3377;--tab-active-bg:#FF3377;--tab-active-text:#fff;
  --badge-bg:#FFE4EE;--badge-text:#FF3377;--toast-bg:#FF3377;--toast-text:#fff;
  --illus-border:#FF3377;
}
body[data-theme="black"]{
  --bg:#1A1A1A;--bg2:#111;--primary:#E0E0E0;--primary2:#bbb;--accent:#FFE200;--accent2:#FFD000;
  --text-on-primary:#1A1A1A;--text-on-accent:#1A1A1A;--frame-bg:#2a2a2a;--frame-border:#E0E0E0;
  --frame-header:#111;--frame-footer:#111;--frame-grid:#222;--frame-slot:#2a2a2a;
  --frame-slot-border:#444;--frame-shadow:#FFE200;--logo-bg:#E0E0E0;--logo-text:#1A1A1A;
  --logo-shadow:#FFE200;--logo-outline:#FFE200;--card-bg:#2a2a2a;--doodle:#E0E0E0;
  --slot-corner:#E0E0E0;--slot-num-bg:#FFE200;--slot-num-text:#1A1A1A;--cam-bg:#111;
  --ctrl-bg:#2a2a2a;--stripe1:#333;--stripe2:#444;--btn-bg:#FFE200;--btn-text:#1A1A1A;
  --btn-shadow:#FFE200;--tab-active-bg:#E0E0E0;--tab-active-text:#1A1A1A;
  --badge-bg:#333;--badge-text:#E0E0E0;--toast-bg:#FFE200;--toast-text:#1A1A1A;
  --illus-border:#E0E0E0;
}
body[data-theme="white"]{
  --bg:#F5F5F5;--bg2:#EBEBEB;--primary:#1A1A1A;--primary2:#333;--accent:#fff;--accent2:#f0f0f0;
  --text-on-primary:#fff;--text-on-accent:#1A1A1A;--frame-bg:#fff;--frame-border:#1A1A1A;
  --frame-header:#1A1A1A;--frame-footer:#1A1A1A;--frame-grid:#f5f5f5;--frame-slot:#fafafa;
  --frame-slot-border:#ddd;--frame-shadow:#FF6B9D;--logo-bg:#1A1A1A;--logo-text:#fff;
  --logo-shadow:#FF6B9D;--logo-outline:#FF6B9D;--card-bg:#fff;--doodle:#1A1A1A;
  --slot-corner:#1A1A1A;--slot-num-bg:#1A1A1A;--slot-num-text:#fff;--cam-bg:#1A1A1A;
  --ctrl-bg:#fff;--stripe1:#1A1A1A;--stripe2:#444;--btn-bg:#1A1A1A;--btn-text:#fff;
  --btn-shadow:#FF6B9D;--tab-active-bg:#1A1A1A;--tab-active-text:#fff;
  --badge-bg:#1A1A1A;--badge-text:#fff;--toast-bg:#1A1A1A;--toast-text:#fff;
  --illus-border:#1A1A1A;
}

body{
  background:var(--bg);
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  transition:background .4s;
}

/* ===== BACKGROUND DOODLES ===== */
.bg-layer{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.bg-svg{width:100%;height:100%;opacity:0.13;}

/* ===== HEADER / LOGO ===== */
.site-header{
  position:relative;z-index:2;
  padding:24px 16px 6px;
  display:flex;flex-direction:column;align-items:center;
  gap:6px;
}

/* The big logo badge */
.logo-badge{
  position:relative;
  display:inline-flex;align-items:center;justify-content:center;
  padding:14px 36px 16px;
  transform:rotate(-1.5deg);
  cursor:default;
}

.logo-blob{
  position:absolute;inset:0;
  background:var(--logo-bg);
  border-radius:60% 50% 55% 65% / 55% 65% 50% 60%;
  border:4px solid var(--logo-outline);
  box-shadow:5px 5px 0 var(--logo-shadow);
  transition:background .4s,border-color .4s,box-shadow .4s;
}

/* Spiky burst behind text */
.logo-burst{
  position:absolute;inset:-10px;
  background:var(--logo-bg);
  clip-path:polygon(50% 0%,55% 10%,65% 5%,62% 16%,75% 12%,70% 23%,85% 22%,78% 32%,92% 35%,83% 43%,96% 50%,85% 55%,95% 65%,82% 67%,88% 78%,75% 78%,78% 90%,65% 87%,65% 98%,52% 93%,50% 100%,48% 93%,35% 98%,35% 87%,22% 90%,25% 78%,12% 78%,18% 67%,5% 65%,15% 55%,4% 50%,17% 43%,8% 35%,22% 32%,15% 22%,30% 23%,25% 12%,38% 16%,35% 5%,45% 10%);
  opacity:0.7;
  z-index:-1;
  transition:background .4s;
}

.logo-text-wrap{
  position:relative;z-index:2;
  font-family:'Boogaloo',cursive;
  color:var(--logo-text);
  text-align:center;
  line-height:1.05;
  letter-spacing:2px;
  transition:color .4s;
}
.logo-text-wrap .l1{
  font-size:22px;
  display:block;
  text-shadow:2px 2px 0 var(--logo-shadow);
  transition:text-shadow .4s;
}
.logo-text-wrap .l2{
  font-size:38px;
  display:block;
  text-shadow:3px 3px 0 var(--logo-shadow);
  transition:text-shadow .4s;
}

/* logo deco stars */
.logo-deco{
  position:absolute;
  font-size:18px;
  color:var(--accent);
  pointer-events:none;
  transition:color .4s;
  z-index:3;
  animation:floatStar 2.5s ease-in-out infinite alternate;
}
@keyframes floatStar{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-5px) rotate(12deg)}}
.logo-deco:nth-child(2){animation-delay:.4s;font-size:14px;}
.logo-deco:nth-child(3){animation-delay:.8s;}

.logo-sub{
  font-family:'Fredoka One',cursive;
  font-size:13px;
  color:var(--primary);
  letter-spacing:3px;
  opacity:.8;
  margin-top:2px;
  transition:color .4s;
}

/* ===== THEME SWITCHER ===== */
.theme-bar{
  display:flex;align-items:center;justify-content:center;
  gap:10px;
  margin:8px 0 2px;
  position:relative;z-index:2;
}
.theme-label{
  font-family:'Fredoka One',cursive;
  font-size:12px;
  color:var(--primary);
  opacity:.8;
  transition:color .4s;
}
.theme-swatches{display:flex;gap:7px;}
.tsw{
  width:26px;height:26px;border-radius:50%;
  border:3px solid rgba(0,0,0,.25);
  cursor:pointer;
  transition:transform .15s,box-shadow .15s;
  position:relative;
}
.tsw:hover{transform:scale(1.2);}
.tsw.active{transform:scale(1.25);box-shadow:0 0 0 2px #fff,0 0 0 4px rgba(0,0,0,.4);}
.tsw-y{background:#FFE200;}
.tsw-p{background:#FF3377;}
.tsw-b{background:#1A1A1A;}
.tsw-w{background:#F5F5F5;border-color:#aaa;}

/* ===== TABS ===== */
.tabs{
  display:flex;justify-content:center;gap:8px;
  margin:10px 16px 0;
  position:relative;z-index:2;
  flex-wrap:wrap;
}
.tab-btn{
  background:var(--frame-bg);
  border:3px solid var(--primary);
  border-radius:50px;
  padding:7px 20px;
  font-family:'Fredoka One',cursive;
  font-size:14px;
  color:var(--primary);
  cursor:pointer;
  box-shadow:3px 3px 0 var(--primary);
  transition:all .15s;
}
.tab-btn:hover,.tab-btn.active{
  background:var(--tab-active-bg);
  color:var(--tab-active-text);
  transform:translate(-1px,-1px);
  box-shadow:4px 4px 0 var(--btn-shadow);
}

/* ===== MAIN ===== */
.main{
  display:flex;flex-direction:column;align-items:center;
  gap:18px;
  padding:12px 16px 40px;
  position:relative;z-index:2;
}

/* ===== CAMERA ===== */
.cam-section{width:100%;max-width:400px;display:none;}
.cam-section.show{display:block;}
.cam-card{
  background:var(--frame-bg);
  border:3px solid var(--primary);
  border-radius:18px;
  overflow:hidden;
  box-shadow:5px 5px 0 var(--primary);
  transition:border-color .4s,box-shadow .4s,background .4s;
}
.cam-topbar{
  background:var(--cam-bg);
  padding:8px 14px;
  display:flex;justify-content:space-between;align-items:center;
  transition:background .4s;
}
.cam-badge{
  background:var(--badge-bg);color:var(--badge-text);
  font-size:11px;font-weight:900;padding:2px 10px;border-radius:20px;
  font-family:'Fredoka One',cursive;
  display:flex;align-items:center;gap:5px;
}
.cam-badge::before{content:'';display:inline-block;width:6px;height:6px;background:#ff2255;border-radius:50%;animation:blinkDot 1s infinite;}
@keyframes blinkDot{0%,100%{opacity:1}50%{opacity:.2}}
.cam-head-title{color:var(--text-on-primary);font-family:'Fredoka One',cursive;font-size:13px;}
.cam-body{position:relative;background:#111;aspect-ratio:4/3;overflow:hidden;}
#cameraFeed{width:100%;height:100%;object-fit:cover;display:block;}
.cam-corners .cc{position:absolute;width:18px;height:18px;}
.cam-corners .cc.tl{top:10px;left:10px;border-top:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:3px 0 0 0;}
.cam-corners .cc.tr{top:10px;right:10px;border-top:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 3px 0 0;}
.cam-corners .cc.bl{bottom:10px;left:10px;border-bottom:3px solid var(--accent);border-left:3px solid var(--accent);border-radius:0 0 0 3px;}
.cam-corners .cc.br{bottom:10px;right:10px;border-bottom:3px solid var(--accent);border-right:3px solid var(--accent);border-radius:0 0 4px 0;}
.flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:10;}
.flash.pop{animation:flashPop .35s ease;}
@keyframes flashPop{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
.cdown-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:9;}
.cdown-num{
  font-family:'Fredoka One',cursive;font-size:90px;
  color:#fff;text-shadow:5px 5px 0 var(--primary);display:none;
}
.cam-footer{
  display:flex;gap:8px;justify-content:center;padding:12px;
  background:var(--frame-grid);transition:background .4s;
}
.cbtn{
  background:var(--btn-bg);color:var(--btn-text);
  border:3px solid var(--primary);border-radius:12px;
  padding:8px 20px;font-family:'Fredoka One',cursive;font-size:14px;
  cursor:pointer;box-shadow:3px 3px 0 var(--btn-shadow);transition:all .15s;
}
.cbtn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--primary);}
.cbtn.snap{font-size:20px;padding:10px 28px;}
.cam-hint{
  text-align:center;margin-top:8px;font-size:12px;
  color:var(--primary);font-weight:700;
  transition:color .4s;
}

/* ===== PHOTO BOOTH FRAME ===== */
.booth-wrap{
  width:100%;max-width:400px;
  position:relative;
}

/* --- layout buttons --- */
.lay-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.lay-btn{
  background:var(--frame-bg);
  border:3px solid var(--primary);border-radius:50px;
  padding:6px 16px;font-family:'Fredoka One',cursive;font-size:12px;
  color:var(--primary);cursor:pointer;
  box-shadow:2px 2px 0 var(--primary);transition:all .15s;
}
.lay-btn:hover,.lay-btn.active{
  background:var(--tab-active-bg);color:var(--tab-active-text);
  transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--btn-shadow);
}

/* --- booth card --- */
.photo-booth{
  background:var(--frame-bg);
  border:4px solid var(--frame-border);
  border-radius:22px;
  overflow:hidden;
  position:relative;
  box-shadow:7px 7px 0 var(--frame-shadow);
  transition:border-color .4s,box-shadow .4s,background .4s;
}

/* checkered top */
.booth-top{
  height:20px;
  background:
    repeating-conic-gradient(var(--stripe1) 0% 25%,var(--stripe2) 0% 50%)
    0 0 / 12px 12px;
  position:relative;
  transition:background .4s;
}
/* REC badges in top */
.booth-top-inner{
  position:absolute;inset:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 10px;
}
.rec-tag{
  background:var(--badge-bg);color:var(--badge-text);
  font-size:9px;font-weight:900;padding:1px 6px;border-radius:4px;
  font-family:'Fredoka One',cursive;
  display:flex;align-items:center;gap:3px;
}
.rec-dot{width:5px;height:5px;background:#ff2255;border-radius:50%;animation:blinkDot 1s infinite;}

/* inner layout area */
.booth-inner{
  padding:0;
  background:var(--frame-grid);
  position:relative;
  transition:background .4s;
}

/* MARK letters — strip layout side deco */
.mark-letters{
  position:absolute;
  left:0;top:0;bottom:0;width:32px;
  display:flex;flex-direction:column;align-items:center;justify-content:space-around;
  z-index:12;pointer-events:none;
  padding:8px 0;
}
.mark-letter{
  font-family:'Fredoka One',cursive;
  font-size:20px;
  color:var(--primary);
  background:var(--accent);
  width:26px;height:26px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--primary);
  line-height:1;
  transition:all .4s;
  box-shadow:2px 2px 0 var(--primary);
}

/* slots area */
.slots-area{
  padding:10px 10px 10px 10px;
  position:relative;
}
.slots-area.has-mark{
  padding-left:42px;
}

/* grid */
.slots-grid{display:grid;gap:8px;position:relative;z-index:2;}
.slots-grid.l-2x2{grid-template-columns:1fr 1fr;}
.slots-grid.l-3x1,.slots-grid.l-4x1{grid-template-columns:1fr;}

/* photo slot */
.photo-slot{
  background:var(--frame-slot);
  border:2px solid var(--frame-slot-border);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;cursor:pointer;
  transition:border-color .2s,transform .1s,background .4s;
}
/* default square-ish */
.photo-slot{aspect-ratio:4/3;border-radius:12px;}
/* cloud/blob shape frames override per layout via class */
.slots-grid.l-blob .photo-slot{
  border-radius:40% 50% 45% 55% / 55% 45% 55% 40%;
  aspect-ratio:1/1;
}
.slots-grid.l-3x1 .photo-slot{aspect-ratio:3/2;border-radius:16px;}
.slots-grid.l-4x1 .photo-slot{aspect-ratio:3/2;border-radius:16px;}
.photo-slot:hover{border-color:var(--primary);transform:scale(1.02);}
.photo-slot img.slot-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.slot-ph{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--frame-slot-border);transition:color .4s;}
.slot-ph svg{width:26px;height:26px;opacity:.7;}
.slot-ph span{font-size:11px;font-weight:700;font-family:'Fredoka One',cursive;}
/* corner marks */
.slot-c{position:absolute;width:13px;height:13px;transition:border-color .4s;}
.slot-c.tl{top:5px;left:5px;border-top:2px solid var(--slot-corner);border-left:2px solid var(--slot-corner);border-radius:3px 0 0 0;}
.slot-c.tr{top:5px;right:5px;border-top:2px solid var(--slot-corner);border-right:2px solid var(--slot-corner);border-radius:0 3px 0 0;}
.slot-c.bl{bottom:5px;left:5px;border-bottom:2px solid var(--slot-corner);border-left:2px solid var(--slot-corner);border-radius:0 0 0 3px;}
.slot-c.br{bottom:5px;right:5px;border-bottom:2px solid var(--slot-corner);border-right:2px solid var(--slot-corner);border-radius:0 0 3px 0;}
.del-btn{
  position:absolute;top:4px;right:4px;background:#ff3355;color:#fff;
  border:none;border-radius:50%;width:20px;height:20px;
  font-size:12px;line-height:20px;text-align:center;cursor:pointer;
  z-index:12;display:none;font-weight:900;
}
.photo-slot:hover .del-btn{display:block;}
.slot-num{
  position:absolute;bottom:4px;left:5px;
  background:var(--slot-num-bg);color:var(--slot-num-text);
  font-family:'Fredoka One',cursive;font-size:9px;
  padding:1px 5px;border-radius:4px;pointer-events:none;
  transition:background .4s,color .4s;
}

/* FRAME DECO ELEMENTS inside booth-inner (cute accessories) */
.fdeco{
  position:absolute;pointer-events:none;z-index:11;
  font-size:14px;
  transition:color .4s;
  color:var(--primary);
  animation:fdeoFloat 3s ease-in-out infinite alternate;
}
@keyframes fdeoFloat{0%{transform:translateY(0) rotate(var(--fr,0deg))}100%{transform:translateY(-4px) rotate(var(--fr,0deg))}}

/* illustrations inside booth */
.booth-illus{
  position:absolute;pointer-events:none;z-index:10;
  overflow:hidden;
}
.booth-illus img{width:100%;height:100%;object-fit:contain;display:block;}

/* frame footer */
.booth-footer{
  background:var(--frame-footer);
  padding:9px 14px;
  text-align:center;
  transition:background .4s;
}
.booth-footer input{
  background:transparent;border:none;
  border-bottom:2px solid var(--accent);
  color:var(--text-on-primary);
  font-family:'Caveat',cursive;font-size:17px;
  text-align:center;width:100%;outline:none;
  transition:color .4s,border-color .4s;
}
.booth-footer input::placeholder{color:rgba(255,255,255,.4);}

/* ===== CONTROLS ===== */
.ctrl-card{
  background:var(--ctrl-bg);
  border:3px solid var(--primary);border-radius:18px;
  padding:16px;width:100%;max-width:400px;
  box-shadow:5px 5px 0 var(--primary);
  transition:background .4s,border-color .4s,box-shadow .4s;
}
.ctrl-ttl{font-family:'Fredoka One',cursive;color:var(--primary);font-size:15px;margin-bottom:10px;text-align:center;transition:color .4s;}
.ctrl-sep{height:1px;background:var(--frame-slot);margin:12px 0;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.filt-btn{
  font-size:12px;font-weight:700;padding:6px 14px;border-radius:50px;
  border:2px solid var(--primary);background:var(--frame-bg);color:var(--primary);
  cursor:pointer;transition:all .15s;font-family:'Fredoka One',cursive;
}
.filt-btn:hover,.filt-btn.active{background:var(--tab-active-bg);color:var(--tab-active-text);}
.act-row{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.act-btn{
  background:var(--btn-bg);border:3px solid var(--primary);border-radius:50px;
  padding:9px 22px;font-family:'Fredoka One',cursive;font-size:14px;
  color:var(--btn-text);cursor:pointer;
  box-shadow:3px 3px 0 var(--btn-shadow);transition:all .15s;
}
.act-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--btn-shadow);}
.act-btn.prime{background:var(--tab-active-bg);color:var(--tab-active-text);}

/* FILTER CLASSES */
.f-none{filter:none}
.f-warm{filter:sepia(.45) saturate(1.4) brightness(1.05)}
.f-cool{filter:hue-rotate(20deg) saturate(.85) brightness(1.05)}
.f-vintage{filter:sepia(.55) contrast(.88) brightness(.92)}
.f-pop{filter:saturate(1.8) contrast(1.1)}
.f-soft{filter:brightness(1.08) saturate(.7) contrast(.9)}
.f-mono{filter:grayscale(1) contrast(1.1)}

/* UTILS */
.hidden{display:none!important;}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--toast-bg);color:var(--toast-text);
  font-family:'Fredoka One',cursive;font-size:14px;
  padding:10px 24px;border-radius:50px;z-index:999;
  opacity:0;transition:opacity .3s;pointer-events:none;
  white-space:nowrap;border:2px solid var(--accent);
}
.toast.show{opacity:1;}
</style>
</head>

// ===== STATE =====
let curFilter = 'none';
let curLayout = '2x2';
let curTheme = 'yellow';
let activeSlot = null;
let slotData = {};
let camStream = null;
let nextSnap = 0;
let illusCache = {i1:null, i2:null};
let illusReady = false;

// ===== LAYOUTS =====
const layouts = [
  {id:'2x2', label:'2×2 Grid', markLetters:false},
  {id:'3x1', label:'3 Strip', markLetters:true},
  {id:'4x1', label:'4 Strip', markLetters:true},
];

const layRow = document.getElementById('layRow');
layouts.forEach(l=>{
  const b=document.createElement('button');
  b.className='lay-btn'+(l.id==='2x2'?' active':'');
  b.textContent=l.label;
  b.dataset.id=l.id;
  b.onclick=()=>{
    document.querySelectorAll('.lay-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    setLayout(l.id);
  };
  layRow.appendChild(b);
});

function slotCount(){ return curLayout==='2x2'?4:curLayout==='3x1'?3:4; }

// ===== BUILD SLOTS =====
function buildSlots(){
  const grid=document.getElementById('slotsGrid');
  const area=document.getElementById('slotsArea');
  grid.className='slots-grid l-'+curLayout;
  const count=slotCount();
  grid.innerHTML=''; slotData={}; nextSnap=0;

  // MARK letters for strip
  document.querySelectorAll('.mark-letters').forEach(e=>e.remove());
  const lay=layouts.find(l=>l.id===curLayout);
  if(lay && lay.markLetters){
    area.classList.add('has-mark');
    const ml=document.createElement('div');
    ml.className='mark-letters';
    'MARK'.split('').slice(0,count).forEach(ch=>{
      const s=document.createElement('div');s.className='mark-letter';s.textContent=ch;
      ml.appendChild(s);
    });
    area.insertBefore(ml, grid);
  } else {
    area.classList.remove('has-mark');
  }

  for(let i=0;i<count;i++){
    const slot=document.createElement('div');
    slot.className='photo-slot f-'+curFilter;
    slot.dataset.index=i;
    ['tl','tr','bl','br'].forEach(p=>{
      const c=document.createElement('div');c.className='slot-c '+p;slot.appendChild(c);
    });
    const ph=document.createElement('div');ph.className='slot-ph';
    ph.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>tap foto</span>';
    slot.appendChild(ph);
    const num=document.createElement('div');num.className='slot-num';num.textContent=i+1;slot.appendChild(num);
    const del=document.createElement('button');del.className='del-btn';del.textContent='×';
    del.onclick=e=>{e.stopPropagation();clearSlot(i);};slot.appendChild(del);
    slot.onclick=()=>clickSlot(i);
    grid.appendChild(slot);
    slotData[i]={img:null};
  }
  setTimeout(injectDecorations,60);
}

// ===== DECORATIONS (illus + cute accessories) =====
function removeWhiteBg(src, threshold, cb){
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');
    c.width=img.naturalWidth;c.height=img.naturalHeight;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    const d=ctx.getImageData(0,0,c.width,c.height);
    for(let i=0;i<d.data.length;i+=4){
      if(d.data[i]>threshold&&d.data[i+1]>threshold&&d.data[i+2]>threshold) d.data[i+3]=0;
    }
    ctx.putImageData(d,0,0);
    cb(c.toDataURL('image/png'));
  };
  img.src=src;
}

function preloadIllus(done){
  if(illusReady){done();return;}
  let n=0;
  function check(){ if(++n===2){illusReady=true;done();} }
  removeWhiteBg(IMG1_SRC,228,png=>{illusCache.i1=png;check();});
  removeWhiteBg(IMG2_SRC,228,png=>{illusCache.i2=png;check();});
}

// cute deco items inside frame
const decoItems = [
  {emoji:'♡', style:'top:6px;right:8px;font-size:13px;--fr:5deg;color:var(--heart,#FF6B9D);'},
  {emoji:'✦', style:'top:6px;left:8px;font-size:11px;--fr:-5deg;'},
  {emoji:'✿', style:'bottom:32px;right:10px;font-size:12px;--fr:10deg;'},
  {emoji:'★', style:'bottom:32px;left:10px;font-size:12px;--fr:-8deg;'},
  {emoji:'·', style:'top:50%;right:6px;font-size:18px;--fr:0deg;'},
];

function injectDecorations(){
  document.querySelectorAll('.fdeco,.booth-illus').forEach(e=>e.remove());
  const inner=document.getElementById('boothInner');
  if(!inner)return;

  // tiny cute deco elements
  decoItems.forEach(d=>{
    const el=document.createElement('div');
    el.className='fdeco';
    el.textContent=d.emoji;
    el.style.cssText=d.style;
    inner.appendChild(el);
  });

  preloadIllus(()=>{
    // illus 1 — bottom right INSIDE inner
    const d1=document.createElement('div');
    d1.className='booth-illus';
    d1.style.cssText='bottom:30px;right:4px;width:72px;height:72px;';
    const i1=document.createElement('img');i1.src=illusCache.i1;
    d1.appendChild(i1);inner.appendChild(d1);

    // illus 2 — somewhere in middle-ish, between slots
    const d2=document.createElement('div');
    d2.className='booth-illus';
    d2.style.cssText='top:50%;left:50%;transform:translate(-50%,-50%);width:70px;height:70px;z-index:11;pointer-events:none;';
    const i2=document.createElement('img');i2.src=illusCache.i2;
    d2.appendChild(i2);inner.appendChild(d2);
  });
}

// ===== THEME =====
function setTheme(t, el){
  curTheme=t;
  document.body.dataset.theme=t;
  document.querySelectorAll('.tsw').forEach(s=>s.classList.remove('active'));
  if(el) el.classList.add('active');
}

// ===== LAYOUT =====
function setLayout(l){
  curLayout=l;
  buildSlots();
}

// ===== FILTER =====
function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.filt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.photo-slot').forEach(s=>{
    s.className=s.className.replace(/f-\w+/,'')+'f-'+f;
  });
}

// ===== SLOT INTERACTIONS =====
function clickSlot(idx){ activeSlot=idx; document.getElementById('fileInput').click(); }

function handleFile(e){
  const f=e.target.files[0]; if(!f||activeSlot===null)return;
  const r=new FileReader();
  r.onload=ev=>setSlotImg(activeSlot,ev.target.result);
  r.readAsDataURL(f); e.target.value='';
}

function setSlotImg(idx,src){
  const slot=document.querySelector(`.photo-slot[data-index="${idx}"]`);
  let img=slot.querySelector('.slot-img');
  if(!img){img=document.createElement('img');img.className='slot-img';slot.insertBefore(img,slot.querySelector('.slot-ph'));}
  img.src=src;
  slot.querySelector('.slot-ph').style.display='none';
  slotData[idx].img=src;
}

function clearSlot(idx){
  slotData[idx]={img:null};
  const slot=document.querySelector(`.photo-slot[data-index="${idx}"]`);
  const img=slot.querySelector('.slot-img');if(img)img.remove();
  slot.querySelector('.slot-ph').style.display='';
}

function clearAll(){ for(let i=0;i<slotCount();i++) clearSlot(i); }

// ===== CAMERA =====
async function startCam(){
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    document.getElementById('cameraFeed').srcObject=camStream;
    document.getElementById('startBtn').classList.add('hidden');
    document.getElementById('snapBtn').classList.remove('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
    showToast('Kamera aktif ♡');
  }catch(err){showToast('Gagal akses kamera: '+err.message);}
}

function stopCam(){
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  document.getElementById('cameraFeed').srcObject=null;
  document.getElementById('startBtn').classList.remove('hidden');
  document.getElementById('snapBtn').classList.add('hidden');
  document.getElementById('stopBtn').classList.add('hidden');
}

function doCountdown(){
  let n=3;
  const el=document.getElementById('cdownNum');
  el.style.display='block';el.textContent=n;
  const t=setInterval(()=>{
    n--; if(n>0){el.textContent=n;}
    else{clearInterval(t);el.style.display='none';snapPhoto();}
  },1000);
}

function snapPhoto(){
  const v=document.getElementById('cameraFeed');
  const c=document.getElementById('snapCanvas');
  c.width=v.videoWidth||640;c.height=v.videoHeight||480;
  const ctx=c.getContext('2d');
  ctx.save();ctx.scale(-1,1);ctx.drawImage(v,-c.width,0);ctx.restore();
  const url=c.toDataURL('image/jpeg',.9);
  const cnt=slotCount(); let placed=false;
  for(let i=nextSnap;i<cnt;i++){
    if(!slotData[i].img){setSlotImg(i,url);nextSnap=i+1;placed=true;break;}
  }
  if(!placed){nextSnap=0;setSlotImg(0,url);nextSnap=1;}
  const fl=document.getElementById('flashEl');
  fl.classList.add('pop');
  setTimeout(()=>fl.classList.remove('pop'),400);
  showToast('📸 Foto masuk ke frame!');
}

// ===== SAVE =====
function saveBooth(){
  const booth=document.getElementById('photoBooth');
  if(typeof html2canvas==='undefined'){showToast('Mohon tunggu...');return;}
  showToast('Menyimpan...');
  html2canvas(booth,{useCORS:true,scale:2.5,backgroundColor:'#ffffff',logging:false}).then(canvas=>{
    const a=document.createElement('a');
    a.download='mark-lee-photobooth.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
    showToast('✦ Foto tersimpan!');
  }).catch(()=>showToast('Gagal menyimpan!'));
}

// ===== TAB =====
function switchTab(t,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('secCam').style.display=t==='camera'?'block':'none';
  if(t!=='camera'&&camStream)stopCam();
}

// ===== TOAST =====
function showToast(msg){
  const el=document.getElementById('toastEl');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ===== INIT =====
document.getElementById('secCam').style.display='block';
buildSlots();
</script>
</body>
</html>
